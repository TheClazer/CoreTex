# Railway deployment configuration for CoreTex backend.
# https://docs.railway.app/reference/config-as-code
#
# This file sets up the API service. The RQ worker is deployed as a
# separate Railway service that points at the same repo and overrides the
# start command (see DEPLOY.md).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
