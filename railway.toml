# Railway deployment configuration for CoreTex backend.
# https://docs.railway.app/reference/config-as-code
#
# This file sets up the API service. The RQ worker is deployed as a
# separate Railway service that points at the same repo and overrides the
# start command (see DEPLOY.md).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Wrap in `sh -c` so $PORT (injected by Railway) gets shell-expanded.
# Without the shell, Docker passes "$PORT" as a literal string to uvicorn.
# 1 worker — RAM-friendly on Railway free tier; scale up later if needed.
startCommand = "sh -c 'uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1'"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
