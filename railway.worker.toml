# Railway deployment configuration for the CoreTex RQ worker.
# Same Docker image as the API; different start command, no HTTP healthcheck.
#
# To use this file: on the worker service in Railway,
#   Settings → Config-as-code → Add File Path → enter `railway.worker.toml`.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# The worker is a long-running process that pops jobs off Redis.
# No HTTP server, so no healthcheck path.
startCommand = "sh -c 'python -m app.queue.worker'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Horizontal scaling (v2: worker autoscale on Railway).
# Each replica is an independent RQ worker popping from the same 'conversions'
# queue, so N replicas process up to N conversions concurrently and remove the
# single-worker head-of-line blocking noted in DEPLOY.md. RQ's Redis queue is
# the coordinator — a job is never handed to two workers. Raise this (or set it
# from the Railway dashboard) as load grows; 2 is a safe default on paid plans.
# Keep it at 1 on the free tier to stay within RAM limits.
numReplicas = 2
